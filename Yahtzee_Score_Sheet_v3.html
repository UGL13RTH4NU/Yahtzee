<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c1272d" id="themeMeta">
  <title>Yahtzee Scorecard</title>
  <style>
    /* 
      THEME VARIABLES
      We define the colors at the root, and then override them 
      based on which player's tab is currently active.
    */
    :root {
      /* Theme 0 (You): Original Maroon */
      --bg: #faf7f2;
      --card: #ffffff;
      --ink: #1a1a1a;
      --ink-soft: #6b6b6b;
      --line: #e5e0d5;
      --line-soft: #f0ebe0;
      --accent: #c1272d;
      --accent-dark: #8f1c22;
      --accent-soft: #fbeaeb;
      --success: #2d7a3e;
      --success-soft: #e8f5e9;
      --warning: #b8860b;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    }
    
    /* Theme 1: Blue */
    body.theme-1 { --bg: #f4f6f9; --line: #dbe4eb; --line-soft: #eaeff4; --accent: #2980b9; --accent-dark: #1f618d; --accent-soft: #eaf2f8; }
    /* Theme 2: Green */
    body.theme-2 { --bg: #f4f9f5; --line: #d8eadc; --line-soft: #eaf5ec; --accent: #27ae60; --accent-dark: #1e8449; --accent-soft: #e9f7ef; }
    /* Theme 3: Purple */
    body.theme-3 { --bg: #f9f4f9; --line: #ebdceb; --line-soft: #f4ebf4; --accent: #8e44ad; --accent-dark: #6c3483; --accent-soft: #f4ecf7; }
    /* Theme 4: Orange */
    body.theme-4 { --bg: #fcf6f2; --line: #eedcd0; --line-soft: #f5ebe3; --accent: #d35400; --accent-dark: #a04000; --accent-soft: #fbeee6; }
    /* Theme 5: Teal */
    body.theme-5 { --bg: #f2f9f8; --line: #d6eae6; --line-soft: #e8f4f2; --accent: #16a085; --accent-dark: #117a65; --accent-soft: #e8f6f3; }
    /* Theme 6: Slate */
    body.theme-6 { --bg: #f5f6f7; --line: #d5d8dc; --line-soft: #ebedef; --accent: #34495e; --accent-dark: #212f3c; --accent-soft: #ebedef; }
    /* Theme 7: Pink */
    body.theme-7 { --bg: #fbf3f6; --line: #ebd6df; --line-soft: #f4e8ed; --accent: #c2185b; --accent-dark: #880e4f; --accent-soft: #fce4ec; }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.75rem;
      font-weight: 900;
      letter-spacing: -0.01em;
      color: var(--accent);
      margin: 0 0 4px;
      font-style: italic;
      transform: skew(-6deg);
      display: inline-block;
      text-shadow: 2px 2px 0 var(--accent-soft);
      transition: color 0.3s ease;
    }

    .subtitle {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--ink-soft);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .player-count {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 8px 14px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .player-count-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
      font-weight: 700;
    }

    .player-count select {
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: var(--ink);
      cursor: pointer;
    }

    .player-count select:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }

    /* Tab Buttons Layout */
    .tabs-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .tab-btn {
      position: relative;
      background: white;
      border: 2px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 90px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .tab-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    /* We use inputs disguised as buttons for seamless typing */
    .tab-btn input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 10px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      text-align: center;
      color: var(--ink-soft);
      font-family: inherit;
      outline: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tab-btn.active input {
      color: var(--accent);
    }
    
    .tab-btn input:focus {
      cursor: text;
    }

    section.card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 14px 12px 12px;
      margin-bottom: 14px;
    }

    section.card h2 {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 2px 4px 12px;
    }

    table.score {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      table-layout: fixed;
    }

    table.score th,
    table.score td {
      padding: 5px 3px;
      text-align: center;
      border-bottom: 1px solid var(--line-soft);
    }

    table.score th {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      font-weight: 800;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    table.score th:first-child,
    table.score td.cat {
      text-align: left;
      font-weight: 700;
      color: var(--ink);
      width: 36%;
      padding-left: 6px;
      font-size: 0.88rem;
    }

    table.score td.cat small {
      display: block;
      font-size: 0.62rem;
      color: var(--ink-soft);
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-top: 1px;
    }

    table.score input[type="number"] {
      width: 100%;
      padding: 10px 2px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafaf7;
      font-size: 16px;
      text-align: center;
      color: var(--ink);
      font-family: inherit;
      font-weight: 700;
      min-height: 42px;
      -moz-appearance: textfield;
      font-variant-numeric: tabular-nums;
    }

    table.score input[type="number"]::-webkit-outer-spin-button,
    table.score input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    table.score input:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
      border-color: transparent;
      background: white;
    }

    tfoot td,
    tr.total-row td {
      font-weight: 700;
      background: rgba(0,0,0,0.02);
      padding: 9px 3px;
      font-variant-numeric: tabular-nums;
    }

    tr.divider td {
      border-top: 2px solid var(--line);
    }

    .calc {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      font-size: 1rem;
    }

    .bonus-earned {
      color: var(--success);
    }

    .bonus-hint {
      color: var(--ink-soft);
      font-weight: 500;
      font-size: 0.72rem;
    }

    .grand-cell {
      background: var(--accent) !important;
      color: white;
      font-size: 1.05rem;
      font-weight: 800;
      transition: background-color 0.3s ease;
    }

    .combined-total {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease;
    }

    .combined-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      opacity: 0.95;
    }

    .combined-value {
      font-size: 1.8rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .compare-inputs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .compare-inputs.two-col {
      grid-template-columns: 1fr 1fr;
    }

    .compare-inputs label {
      display: flex;
      flex-direction: column;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      font-weight: 700;
    }

    .compare-inputs .lbl-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-inputs input {
      margin-top: 5px;
      padding: 12px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
    }

    .compare-inputs input:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
      border-color: transparent;
    }

    button.primary,
    button.secondary {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      min-height: 48px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    button.primary {
      background: var(--accent);
      color: white;
    }

    button.primary:hover,
    button.primary:active {
      background: var(--accent-dark);
    }

    button.primary:active {
      transform: scale(0.99);
    }

    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }

    button.secondary:hover,
    button.secondary:active {
      background: var(--accent-soft);
    }

    .result {
      margin-top: 14px;
      padding: 18px 14px;
      border-radius: 10px;
      display: none;
    }

    .result.win {
      background: var(--success-soft);
      color: #1b5e20;
      border: 1.5px solid #a5d6a7;
    }

    .result.lose {
      background: #ffebee;
      color: #b71c1c;
      border: 1.5px solid #ef9a9a;
    }

    .result.tie {
      background: #fff8e1;
      color: #7f5d00;
      border: 1.5px solid #ffe082;
    }

    .result-headline {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
      text-align: center;
    }

    .rank-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.55);
      gap: 8px;
      color: var(--ink);
    }

    .rank-row.is-you {
      background: white;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.10);
    }

    .rank-position {
      font-size: 1.05rem;
      font-weight: 800;
      text-align: center;
    }

    .rank-name {
      font-size: 1rem;
      font-weight: 700;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .you-tag {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-left: 6px;
      font-weight: 600;
    }

    .rank-score {
      font-size: 1.1rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .footer-actions {
      margin-top: 24px;
    }

    @media (min-width: 500px) {
      .app { padding: 20px 16px 40px; }
      table.score th, table.score td { font-size: 0.95rem; padding: 6px 5px; }
      table.score td.cat { font-size: 0.95rem; }
      h1 { font-size: 3.25rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>YAHTZEE</h1>
      <div class="subtitle" id="subtitle">Score Pad — You</div>
      
      <div class="player-count">
        <span class="player-count-label">Players</span>
        <select id="playerCountSelect" aria-label="Number of players">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
      </div>

      <!-- Player Toggle Tabs go here -->
      <div class="tabs-container" id="namesGrid"></div>
    </header>

    <section class="card">
      <h2>Upper Section</h2>
      <table class="score" id="upperTable"></table>
    </section>

    <section class="card">
      <h2>Lower Section</h2>
      <table class="score" id="lowerTable"></table>
    </section>

    <section class="card">
      <h2>Grand Totals</h2>
      <table class="score">
        <thead>
          <tr>
            <th>&nbsp;</th>
            <th>Game 1</th>
            <th>Game 2</th>
            <th>Game 3</th>
          </tr>
        </thead>
        <tbody>
          <tr class="total-row">
            <td class="cat">Grand Total</td>
            <td class="calc grand-cell" id="grand-g1">0</td>
            <td class="calc grand-cell" id="grand-g2">0</td>
            <td class="calc grand-cell" id="grand-g3">0</td>
          </tr>
        </tbody>
      </table>
      <div class="combined-total">
        <span class="combined-label">Combined<br>(All 3 Games)</span>
        <span class="combined-value" id="combinedTotal">0</span>
      </div>
    </section>

    <!-- Compare Section is only visible when Player 1 is active -->
    <section class="card" id="compareSection">
      <h2>Compare Final Scores</h2>
      <div class="compare-inputs" id="compareInputs"></div>
      <button class="primary" id="compareBtn">Compare Final Scores</button>
      <div class="result" id="result"></div>
    </section>

    <div class="footer-actions">
      <button class="secondary" id="resetBtn">Reset All Scores</button>
    </div>
  </div>

  <script>
    const NUM_GAMES = 3;
    const MAX_PLAYERS = 8;
    // Bumped storage to v3 to accommodate full tracking capabilities safely
    const STORAGE_KEY = 'yahtzee-scorecard-v3';

    const CATEGORIES = {
      upper: [
        { id: 'aces',   label: 'Aces',   hint: 'Count of 1s' },
        { id: 'twos',   label: 'Twos',   hint: 'Sum of 2s' },
        { id: 'threes', label: 'Threes', hint: 'Sum of 3s' },
        { id: 'fours',  label: 'Fours',  hint: 'Sum of 4s' },
        { id: 'fives',  label: 'Fives',  hint: 'Sum of 5s' },
        { id: 'sixes',  label: 'Sixes',  hint: 'Sum of 6s' }
      ],
      lower: [
        { id: 'kind3',      label: '3 of a Kind',   hint: 'Sum of all dice' },
        { id: 'kind4',      label: '4 of a Kind',   hint: 'Sum of all dice' },
        { id: 'fullHouse',  label: 'Full House',    hint: '25 points' },
        { id: 'smStraight', label: 'Sm. Straight',  hint: '30 points' },
        { id: 'lgStraight', label: 'Lg. Straight',  hint: '40 points' },
        { id: 'yahtzee',    label: 'YAHTZEE',       hint: '50 points' },
        { id: 'chance',     label: 'Chance',        hint: 'Sum of all dice' }
      ]
    };

    let playerCount = 2;
    let currentPlayer = 0; // 0 = Player 1 (You), 1 = Player 2, etc.
    let playerNames = [];
    
    // Array of 8 objects holding the individual scores for each player
    let allScores = Array.from({ length: MAX_PLAYERS }, () => ({}));

    // ---------- Helpers ----------
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function escapeAttr(s) {
      return String(s).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch]);
    }
    function getVal(id) {
      const el = document.getElementById(id);
      if (!el) return 0;
      const v = parseInt(el.value, 10);
      return isNaN(v) ? 0 : v;
    }
    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }
    function ordinal(n) {
      const s = ['th', 'st', 'nd', 'rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }
    function medalOrRank(rank) {
      if (rank === 1) return '🥇';
      if (rank === 2) return '🥈';
      if (rank === 3) return '🥉';
      return ordinal(rank);
    }

    // ---------- Scoresheet builders ----------
    function buildUpper() {
      const rows = [];
      rows.push('<thead><tr><th>Category</th>');
      for (let g = 1; g <= NUM_GAMES; g++) rows.push(`<th>Game ${g}</th>`);
      rows.push('</tr></thead><tbody>');
      for (const c of CATEGORIES.upper) {
        rows.push(`<tr><td class="cat">${c.label}<small>${c.hint}</small></td>`);
        for (let g = 1; g <= NUM_GAMES; g++) {
          rows.push(`<td><input type="number" inputmode="numeric" min="0" max="999" id="${c.id}-g${g}"></td>`);
        }
        rows.push('</tr>');
      }
      rows.push('</tbody><tfoot>');
      rows.push('<tr class="divider"><td class="cat">Subtotal<small>Need 63 for bonus</small></td>');
      for (let g = 1; g <= NUM_GAMES; g++) rows.push(`<td class="calc" id="upperSubtotal-g${g}"></td>`);
      rows.push('</tr><tr><td class="cat">Bonus<small>+35 if subtotal ≥ 63</small></td>');
      for (let g = 1; g <= NUM_GAMES; g++) rows.push(`<td class="calc" id="bonus-g${g}"></td>`);
      rows.push('</tr><tr class="total-row"><td class="cat">Upper Total</td>');
      for (let g = 1; g <= NUM_GAMES; g++) rows.push(`<td class="calc" id="upperTotal-g${g}"></td>`);
      rows.push('</tr></tfoot>');
      document.getElementById('upperTable').innerHTML = rows.join('');
    }

    function buildLower() {
      const rows = [];
      rows.push('<thead><tr><th>Category</th>');
      for (let g = 1; g <= NUM_GAMES; g++) rows.push(`<th>Game ${g}</th>`);
      rows.push('</tr></thead><tbody>');
      for (const c of CATEGORIES.lower) {
        rows.push(`<tr><td class="cat">${c.label}<small>${c.hint}</small></td>`);
        for (let g = 1; g <= NUM_GAMES; g++) {
          rows.push(`<td><input type="number" inputmode="numeric" min="0" max="999" id="${c.id}-g${g}"></td>`);
        }
        rows.push('</tr>');
      }
      rows.push('</tbody><tfoot>');
      rows.push('<tr class="divider total-row"><td class="cat">Lower Total</td>');
      for (let g = 1; g <= NUM_GAMES; g++) rows.push(`<td class="calc" id="lowerTotal-g${g}"></td>`);
      rows.push('</tr></tfoot>');
      document.getElementById('lowerTable').innerHTML = rows.join('');
    }

    // ---------- Tab UI Builder ----------
    function buildTabs() {
      const container = document.getElementById('namesGrid');
      let html = '';
      for (let i = 0; i < playerCount; i++) {
        const isYou = i === 0;
        const activeCls = i === currentPlayer ? 'active' : '';
        const placeholder = isYou ? 'Your Name' : `Player ${i + 1}`;
        const val = escapeAttr(playerNames[i] || '');
        
        html += `
          <div class="tab-btn ${activeCls}" data-idx="${i}">
            <input type="text" id="name-input-${i}" autocomplete="off" placeholder="${placeholder}" value="${val}">
          </div>
        `;
      }
      container.innerHTML = html;

      // Tab Behaviors: Clicking switches players, pressing Enter "locks" it.
      const tabs = container.querySelectorAll('.tab-btn');
      tabs.forEach((tab, i) => {
        const input = tab.querySelector('input');
        
        input.addEventListener('focus', () => {
          if (currentPlayer !== i) switchPlayer(i);
        });

        input.addEventListener('input', () => {
          playerNames[i] = input.value;
          updateHeaderName();
          updateCompareLabels();
          save();
        });

        // The "Lock-in" feature - Enter key removes cursor and turns it into a clean button
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            input.blur(); 
          }
        });
      });
    }

    // ---------- Compare UI Builder ----------
    function buildCompareUI(totals) {
      const container = document.getElementById('compareInputs');
      container.className = 'compare-inputs' + (playerCount > 2 ? ' two-col' : '');
      let html = '';
      for (let i = 1; i < playerCount; i++) {
        const name = (playerNames[i] || '').trim() || `Player ${i + 1}`;
        const totalVal = totals[i - 1] || '';
        html += `<label>
          <span class="lbl-text" id="lbl-total-p${i}">${escapeHtml(name)}'s total</span>
          <input type="number" inputmode="numeric" id="total-p${i}" value="${escapeAttr(totalVal)}" placeholder="0">
        </label>`;
      }
      container.innerHTML = html;
      container.querySelectorAll('input').forEach(el => {
        el.addEventListener('input', save);
      });
    }

    function updateCompareLabels() {
      for (let i = 1; i < playerCount; i++) {
        const lblEl = document.getElementById(`lbl-total-p${i}`);
        if (lblEl) {
          const name = (playerNames[i] || '').trim() || `Player ${i + 1}`;
          lblEl.textContent = `${name}'s total`;
        }
      }
    }

    function updateHeaderName() {
      const subtitle = document.getElementById('subtitle');
      const currentName = (playerNames[currentPlayer] || '').trim();
      const displayName = currentName ? currentName : (currentPlayer === 0 ? 'You' : `Player ${currentPlayer + 1}`);
      subtitle.textContent = `Score Pad — ${displayName}`;
    }

    // ---------- Player View Switching Logic ----------
    
    function saveDOMToState() {
      // Save current input values into the array before we switch tabs
      const currentScores = {};
      document.querySelectorAll('table.score input[type="number"]').forEach(el => {
        currentScores[el.id] = el.value;
      });
      allScores[currentPlayer] = currentScores;
    }

    function loadStateToDOM() {
      // Pull this player's scores into the table inputs
      const currentScores = allScores[currentPlayer] || {};
      document.querySelectorAll('table.score input[type="number"]').forEach(el => {
        el.value = currentScores[el.id] || '';
      });
      recalc();
    }

    function switchPlayer(idx) {
      if (idx === currentPlayer) return;
      saveDOMToState();
      
      currentPlayer = idx;
      
      // Update color theme
      document.body.className = 'theme-' + currentPlayer;

      // Update active tabs styling
      document.querySelectorAll('.tab-btn').forEach((tab, i) => {
        tab.classList.toggle('active', i === currentPlayer);
      });

      // Show "Compare Final Scores" ONLY if you are on Player 1's tab
      const compareSection = document.getElementById('compareSection');
      compareSection.style.display = currentPlayer === 0 ? 'block' : 'none';

      updateHeaderName();
      loadStateToDOM();
      save();
    }

    // ---------- Scoresheet calculation ----------

    function recalc() {
      let combined = 0;
      for (let g = 1; g <= NUM_GAMES; g++) {
        let upperSubtotal = 0;
        for (const c of CATEGORIES.upper) upperSubtotal += getVal(`${c.id}-g${g}`);
        setText(`upperSubtotal-g${g}`, upperSubtotal || '');

        const bonusEl = document.getElementById(`bonus-g${g}`);
        let bonus = 0;
        if (upperSubtotal >= 63) {
          bonus = 35;
          bonusEl.textContent = '35';
          bonusEl.className = 'calc bonus-earned';
        } else if (upperSubtotal > 0) {
          bonusEl.textContent = `need ${63 - upperSubtotal}`;
          bonusEl.className = 'calc bonus-hint';
        } else {
          bonusEl.textContent = '';
          bonusEl.className = 'calc bonus-hint';
        }

        const upperTotal = upperSubtotal + bonus;
        setText(`upperTotal-g${g}`, upperTotal || '');

        let lowerTotal = 0;
        for (const c of CATEGORIES.lower) lowerTotal += getVal(`${c.id}-g${g}`);
        setText(`lowerTotal-g${g}`, lowerTotal || '');

        const grand = upperTotal + lowerTotal;
        setText(`grand-g${g}`, grand);
        combined += grand;
      }
      setText('combinedTotal', combined);
      
      // Auto-Sync Magic: If we are modifying Player 2-8's card, auto-update their final score in the Compare section!
      if (currentPlayer > 0) {
        const compareTotalEl = document.getElementById(`total-p${currentPlayer}`);
        if (compareTotalEl) {
          compareTotalEl.value = combined || '';
        }
      }

      saveDOMToState(); // Always keep memory up to date
      save();
    }

    // ---------- Persistence ----------

    function readTotalsFromDOM() {
      const totals = [];
      for (let i = 1; i < MAX_PLAYERS; i++) {
        const el = document.getElementById(`total-p${i}`);
        totals.push(el ? el.value : '');
      }
      return totals;
    }

    function save() {
      const data = {
        playerCount: playerCount,
        names: playerNames,
        totals: readTotalsFromDOM(),
        scores: allScores
      };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    }

    function load() {
      let data = null;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch (e) {}

      if (!data) return { totals: [] };

      if (data.playerCount) {
        playerCount = Math.min(Math.max(parseInt(data.playerCount, 10) || 2, 2), MAX_PLAYERS);
        const sel = document.getElementById('playerCountSelect');
        if (sel) sel.value = playerCount;
      }

      if (Array.isArray(data.names)) playerNames = data.names;
      if (Array.isArray(data.scores)) allScores = data.scores;

      return {
        totals: Array.isArray(data.totals) ? data.totals : []
      };
    }

    // ---------- Compare Function ----------

    function compareFinal() {
      // Calculate Player 1 directly from their local state/DOM
      const yourTotal = parseInt(document.getElementById('combinedTotal').textContent, 10) || 0;
      const yourNameRaw = (playerNames[0] || '').trim();
      const yourName = yourNameRaw || 'You';

      const players = [{ name: yourName, total: yourTotal, isYou: true }];

      for (let i = 1; i < playerCount; i++) {
        const totalEl = document.getElementById(`total-p${i}`);
        if (!totalEl) continue;
        const raw = totalEl.value.trim();
        if (raw === '') continue;
        const total = parseInt(raw, 10);
        if (isNaN(total)) continue;
        const name = (playerNames[i] || '').trim() || `Player ${i + 1}`;
        players.push({ name, total, isYou: false });
      }

      if (players.length < 2) {
        alert("Enter at least one opponent's total to compare.");
        return;
      }

      players.sort((a, b) => b.total - a.total);
      let rank = 1;
      for (let i = 0; i < players.length; i++) {
        if (i > 0 && players[i].total < players[i - 1].total) rank = i + 1;
        players[i].rank = rank;
      }

      const you = players.find(p => p.isYou);
      const firstPlacePlayers = players.filter(p => p.rank === 1);
      const youAreFirst = you.rank === 1;
      const soloWinner = firstPlacePlayers.length === 1;

      let headline, panelClass;
      if (youAreFirst && soloWinner) {
        headline = yourNameRaw ? `🏆 ${escapeHtml(yourName)} wins!` : `🏆 You win!`;
        panelClass = 'win';
      } else if (youAreFirst) {
        const others = firstPlacePlayers.filter(p => !p.isYou).map(p => p.name);
        headline = `🤝 Tied for 1st with ${escapeHtml(others.join(', '))}`;
        panelClass = 'tie';
      } else if (soloWinner) {
        const winner = firstPlacePlayers[0];
        headline = `🏆 ${escapeHtml(winner.name)} wins`;
        panelClass = 'lose';
      } else {
        const winners = firstPlacePlayers.map(p => p.name);
        headline = `🤝 Tied for 1st: ${escapeHtml(winners.join(', '))}`;
        panelClass = 'lose';
      }

      let listHtml = '<div class="rank-list">';
      for (const p of players) {
        const marker = medalOrRank(p.rank);
        const youTag = p.isYou ? '<span class="you-tag">you</span>' : '';
        listHtml += `<div class="rank-row ${p.isYou ? 'is-you' : ''}">
          <span class="rank-position">${marker}</span>
          <span class="rank-name">${escapeHtml(p.name)}${youTag}</span>
          <span class="rank-score">${p.total}</span>
        </div>`;
      }
      listHtml += '</div>';

      const result = document.getElementById('result');
      result.className = 'result ' + panelClass;
      result.innerHTML = `<div class="result-headline">${headline}</div>${listHtml}`;
      result.style.display = 'block';
      result.scrollIntoView({ behavior: 'smooth', block: 'center' });
      save();
    }

    // ---------- Reset ----------

    function resetAll() {
      if (!confirm('Clear all scores and start fresh? (Player names and count will be kept.)')) return;
      
      // Clear memory arrays
      allScores = Array.from({length: MAX_PLAYERS}, () => ({}));
      
      // Clear comparison fields
      for (let i = 1; i < MAX_PLAYERS; i++) {
        const el = document.getElementById(`total-p${i}`);
        if (el) el.value = '';
      }

      // Clear current UI
      document.querySelectorAll('table.score input').forEach(el => el.value = '');
      document.getElementById('result').style.display = 'none';
      
      // Ensure we stay on the current tab, but zeroed out
      loadStateToDOM();
    }

    // ---------- Init ----------

    function init() {
      buildUpper();
      buildLower();

      const loaded = load();
      buildTabs();
      buildCompareUI(loaded.totals);

      // Make sure we load Player 1 (You) by default
      document.body.className = 'theme-0';
      loadStateToDOM();
      updateHeaderName();

      document.querySelectorAll('table.score input').forEach(el => {
        el.addEventListener('input', recalc);
      });

      document.getElementById('playerCountSelect').addEventListener('change', (e) => {
        playerCount = parseInt(e.target.value, 10);
        buildTabs();
        buildCompareUI(readTotalsFromDOM());
        save();
      });

      document.getElementById('compareBtn').addEventListener('click', compareFinal);
      document.getElementById('resetBtn').addEventListener('click', resetAll);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
